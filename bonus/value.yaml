global:
  hosts:
    domain: kixlab.com
    https: false
  ingress:
    configureCertmanager: false
    tls:
      secretName: ""

nginx-ingress:
  enabled: true
  controller:
    service:
      type: NodePort
      externalTrafficPolicy: Cluster

postgresql:
  persistence:
    storageClass: local-path
    size: 10Gi

redis:
  persistence:
    storageClass: local-path
    size: 5Gi

gitlab:
  gitaly:
    persistence:
      storageClass: local-path
      size: 10Gi
  webservice:
    service:
      type: NodePort
  registry:
    enabled: false
  prometheus:
    install: false
