   apiVersion: argoproj.io/v1alpha1
   kind: Application
   metadata:
     name: gitlab
     namespace: argocd
   spec:
     project: default
     source:
       chart: gitlab
       repoURL: https://charts.gitlab.io/
       targetRevision: 7.6.0  # Version récente du chart ; vérifie https://charts.gitlab.io/ pour la dernière
       helm:
         valuesObject:
           global:
             hosts:
               domain: example.com  # Remplace par ton domaine ou IP (e.g., <IP_VM>)
               hostSuffix: ""  # Pour éviter les sous-domaines si tu n'as pas de DNS
             ingress:
               configureCertmanager: false  # Désactive Cert-Manager pour simplifier
           certmanager:
             install: false
           nginx-ingress:
             enabled: false  # On utilise NodePort pour l'accès
           gitlab:
             webservice:
               service:
                 type: NodePort
                 nodePort: 30082  # Port externe pour GitLab (différent de Argo CD)
             gitaly:
               persistence:
                 enabled: true
                 size: 10Gi
             postgresql:
               persistence:
                 enabled: true
                 size: 10Gi
             redis:
               persistence:
                 enabled: true
                 size: 5Gi
           registry:
             enabled: false  # Désactive le registry pour simplifier
           prometheus:
             install: false
     destination:
       server: 'https://kubernetes.default.svc'
       namespace: gitlab  # Nouveau namespace pour GitLab
     syncPolicy:
       automated:
         selfHeal: true
         prune: true
   
